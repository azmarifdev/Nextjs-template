name: CI

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "src/**"
      - "scripts/**"
      - "drizzle/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.ts"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
      - master
      - develop
    tags-ignore:
      - "v*.*.*"
    paths:
      - "src/**"
      - "scripts/**"
      - "drizzle/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "next.config.ts"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test]
    env:
      NEXT_PUBLIC_APP_NAME: Nextjs Starter Template
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        if: matrix.task == 'lint'
        run: pnpm run lint

      - name: Run typecheck
        if: matrix.task == 'typecheck'
        run: pnpm run typecheck

      - name: Run tests
        if: matrix.task == 'test'
        run: pnpm run test

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_NAME: Nextjs Starter Template
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

  e2e:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'develop')
    env:
      NEXT_PUBLIC_APP_NAME: Nextjs Starter Template
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
